name: Deploy Staging

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

jobs:
  deploy-staging:
    name: deploy-staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout commit from successful CI run
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Execute staging deployment
        id: deploy
        env:
          STAGING_DEPLOY_COMMAND: ${{ secrets.STAGING_DEPLOY_COMMAND }}
        run: scripts/deploy/staging_deploy.sh

      - name: Trigger rollback path on deployment failure
        if: ${{ failure() }}
        env:
          STAGING_ROLLBACK_COMMAND: ${{ secrets.STAGING_ROLLBACK_COMMAND }}
        run: scripts/deploy/staging_rollback.sh

      - name: Deployment summary
        if: ${{ success() }}
        run: |
          {
            echo "### Staging deployment"
            echo ""
            echo "- Commit: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "- Status: success"
          } >> "$GITHUB_STEP_SUMMARY"
