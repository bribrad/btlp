groups:
  - name: btlp_backend
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="btlp-backend", status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="btlp-backend"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on btlp-backend"
          description: >
            More than 5% of requests are resulting in 5xx errors over the last 5 minutes.
            Current rate: {{ $value | humanizePercentage }}

      - alert: HighClientErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{application="btlp-backend", status=~"4.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="btlp-backend"}[5m]))
          ) > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 4xx error rate on btlp-backend"
          description: >
            More than 20% of requests are resulting in 4xx errors over the last 5 minutes.
            Current rate: {{ $value | humanizePercentage }}

      - alert: ServiceDown
        expr: up{job="btlp-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "btlp-backend is unreachable"
          description: "Prometheus cannot scrape btlp-backend. The service may be down."
